  {id:'roy',         n:'Roy Zohar',                b:'2011',  d:'',          l:'Magal, Israel',       g:'M', gen:8, p1:'tamar_m',   p2:'gal',        sp:''          },
  {id:'avigail',     n:'Avigail Makower',          b:'2013',  d:'',          l:'Toronto',             g:'F', gen:8, p1:'omri',      p2:'shawna',     sp:''          },
  {id:'adele',       n:'Adele Makower',            b:'2024',  d:'',          l:'Toronto',             g:'F', gen:8, p1:'omri',      p2:'shawna',     sp:''          },
  {id:'itay',        n:'Itay Makower',             b:'2019',  d:'',          l:'New Jersey',          g:'M', gen:8, p1:'yuval',     p2:'tair',       sp:''          },
  {id:'ilan_l',      n:'Ilan Makower',             b:'2022',  d:'',          l:'New Jersey',          g:'M', gen:8, p1:'yuval',     p2:'tair',       sp:''          },
];

// ── Branch colours — each Gen 4 child of David gets its own colour ─
// All their descendants inherit the same colour
const BRANCH_COLORS = {
  tanchum:  '#E05A2B',
  isaac_y:  '#1B7A4E',
  baruch:   '#8B2020',
  rachel_r: '#C0392B',
  yosef:    '#7D6608',
  frieda:   '#8E44AD',
  zipora:   '#2471A3',
  ester_m:  '#B7950B',
};

// Walk up to find the Gen 4 ancestor branch root
const idMap = {};
P.forEach(p => idMap[p.id] = p);

function getBranchColor(pid) {
  let cur = idMap[pid];
  if (!cur) return '#999';
  // Walk up parent chain to find first gen-4 Makower child
  for (let depth = 0; depth < 10; depth++) {
    if (BRANCH_COLORS[cur.id]) return BRANCH_COLORS[cur.id];
    // Try to go up via parent1 (the Makower-line parent)
    const p1 = cur.p1 && idMap[cur.p1];
    if (p1) { cur = p1; continue; }
    const p2 = cur.p2 && idMap[cur.p2];
    if (p2) { cur = p2; continue; }
    break;
  }
  return '#777'; // gen 1-3 connections
}

// Card colours
const HL = new Set(['hadassah_b','bracha','hadassah_ber','ada','rachel_r','yitschak_b','baruch','lea','isaac_y','hinda']);
const DC = new Set(['dawid','rachel_f','tanchum_f','zelda','david','tanchum','gila','ezriel','ester_m','tanchum_y','zipora','yoseph_k','frieda','yosef','rachel_l','alexander','yigal','uri_k','hadasa']);
function gc(id, g) {
  const s = HL.has(id)?'h': DC.has(id)?'d':'l';
  const f={h:{M:'#CDD0E8',F:'#E8CDD6'},d:{M:'#C8DCF0',F:'#F0C8DC'},l:{M:'#D6EAF8',F:'#FAD6EA'}};
  const k={h:{M:'#5B3A8A',F:'#8A2040'},d:{M:'#1B5E7A',F:'#8B3060'},l:{M:'#3B8BD4',F:'#D45389'}};
  return {fill:f[s][g], stroke:k[s][g]};
}

const BRANCHES = {
  tanchum: new Set(['tanchum','gila','yigal','naomi','orit','yitzchak_f','ofer','carmen','nizan','efrat','dolev','nofar','gil','daniel','tal_y','noah','maya']),
  baruch:  new Set(['baruch','lea','hadassah_b','bracha']),
  isaac:   new Set(['isaac_y','hinda','alexander','rachel_l','ada','amir_m','adina','yacob_m','ofra','ilan','vardit','tal_m','yaniv','eyal','uri_m','hagar','tamar_m','gal','omri','shawna','yuval','tair','ori_m','eran','shira','alon','rony','yotam','omer','yaara','roy','avigail','adele','itay','ilan_l']),
  rachel:  new Set(['rachel_r','yitschak_b','hadassah_ber']),
  frieda:  new Set(['frieda','yoseph_k','uri_k']),
  zipora:  new Set(['zipora','tanchum_y','menachem','tamar_f','david_y','ester_z','uri_ya','esther_p','einat','hadar','dana','amir_l','osnat','ayelet','yiftach','nadav','reut','yoav','bar','noy','maylee','ilay','tuval']),
  ester:   new Set(['ester_m','ezriel','yacob_by','nirit','ravit','arik','limor','nir','offer','sagi']),
};
const CORE = new Set(['dawid','rachel_f','tanchum_f','zelda','david','hadasa']);

const GENS = [1,2,3,4,5,6,7,8];
const BW=148, BH=48, PT=30, PL=52, CW=162, RH=72;
let activeBranch = 'all';

function tr(s,n) { return s&&s.length>n ? s.slice(0,n-1)+'…' : (s||''); }

// ── Family-aware layout (spouses adjacent, children under parents) ─
function computePositions(filtered) {
  const ids = new Set(filtered.map(p => p.id));
  const pm = {};
  const hasParents = new Set();
  filtered.forEach(p => {
    if ((p.p1 && ids.has(p.p1)) || (p.p2 && ids.has(p.p2))) hasParents.add(p.id);
  });
  const marriedIn = new Set(filtered.filter(p => !p.p1 && !p.p2).map(p => p.id));

  GENS.forEach(gen => {
    const gp = filtered.filter(p => p.gen === gen);
    if (!gp.length) return;
    const roots = gp.filter(p => hasParents.has(p.id) || gen <= 3);
    roots.sort((a, b) => {
      const ax = parentMidX(a, pm), bx = parentMidX(b, pm);
      if (ax !== null && bx !== null) return ax - bx;
      if (ax !== null) return -1;
      if (bx !== null) return 1;
      return (parseFloat((a.b||'0').replace('~',''))||9999) - (parseFloat((b.b||'0').replace('~',''))||9999);
    });
    let col = 0;
    const placed = new Set();
    roots.forEach(root => {
      if (placed.has(root.id)) return;
      pm[root.id] = col++; placed.add(root.id);
      const sp = root.sp && ids.has(root.sp) ? idMap[root.sp] : null;
      if (sp && marriedIn.has(sp.id) && !placed.has(sp.id)) {
        pm[sp.id] = col++; placed.add(sp.id);
      }
    });
    gp.forEach(p => { if (!placed.has(p.id)) { pm[p.id] = col++; placed.add(p.id); } });
  });
  return pm;
}

function parentMidX(p, pm) {
  const x1 = (p.p1 && pm[p.p1] !== undefined) ? pm[p.p1] : null;
  const x2 = (p.p2 && pm[p.p2] !== undefined) ? pm[p.p2] : null;
  if (x1!==null && x2!==null) return (x1+x2)/2;
  return x1 ?? x2;
}

function buildTree() {
  const bids = activeBranch==='all' ? null : new Set([...BRANCHES[activeBranch], ...CORE]);
  const filtered = bids ? P.filter(p => bids.has(p.id)) : P;
  const ids = new Set(filtered.map(p => p.id));

  const colMap = computePositions(filtered);
  const pm = {};
  filtered.forEach(p => {
    if (colMap[p.id] !== undefined)
      pm[p.id] = { x: PL + colMap[p.id]*CW, y: PT + GENS.indexOf(p.gen)*RH*2 };
  });

  const maxX = Math.max(...Object.values(pm).map(p=>p.x)) + BW + PL;
  const svgW = Math.max(maxX, 600);
  const svgH = GENS.length*RH*2 + PT*2 + 20;

  let s = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

  GENS.forEach((g,gi) => {
    const y = PT + gi*RH*2 + BH/2 + 4;
    s += `<text class="gl" x="4" y="${y}" dominant-baseline="central">Gen ${g}</text>`;
  });

  // ── Coloured parent→child connectors ──────────────────────────
  // Use a thicker, coloured line per branch — much easier to follow
  filtered.forEach(child => {
    const cpos = pm[child.id];
    if (!cpos) return;
    const cx = cpos.x + BW/2, cy = cpos.y;
    const p1ok = child.p1 && ids.has(child.p1) && pm[child.p1];
    const p2ok = child.p2 && ids.has(child.p2) && pm[child.p2];
    let fromX, fromY;
    if (p1ok && p2ok) {
      fromX = (pm[child.p1].x + BW/2 + pm[child.p2].x + BW/2) / 2;
      fromY = pm[child.p1].y + BH;
    } else if (p1ok) {
      fromX = pm[child.p1].x + BW/2; fromY = pm[child.p1].y + BH;
    } else if (p2ok) {
      fromX = pm[child.p2].x + BW/2; fromY = pm[child.p2].y + BH;
    } else return;

    // Determine branch colour from the child's Makower-line ancestor
    const lineColor = getBranchColor(child.p1 || child.p2);
    const midY = fromY + (cy - fromY) * 0.5;

    s += `<path fill="none" stroke="${lineColor}" stroke-width="2" opacity="0.7"
      d="M${fromX},${fromY} L${fromX},${midY} L${cx},${midY} L${cx},${cy}"/>`;
  });

  // ── Spouse dashed lines (neutral grey) ────────────────────────
  const drawn = new Set();
  filtered.forEach(p => {
    if (!p.sp || !ids.has(p.sp)) return;
    const key = [p.id, p.sp].sort().join('|');
    if (drawn.has(key)) return;
    drawn.add(key);
    const pp = pm[p.id], sp = pm[p.sp];
    if (!pp || !sp) return;
    const y = pp.y + BH/2;
    const x1 = Math.min(pp.x+BW, sp.x+BW);
    const x2 = Math.max(pp.x, sp.x);
    if (x2 <= x1) return;
    s += `<line fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5 4"
      x1="${x1}" y1="${y}" x2="${x2}" y2="${y}"/>`;
  });

  // ── Person cards ──────────────────────────────────────────────
  filtered.forEach(p => {
    const pos = pm[p.id];
    if (!pos) return;
    const {x,y} = pos, cx = x + BW/2;
    const {fill, stroke} = gc(p.id, p.g);
    const info = [p.b&&`b.${p.b}`, p.d&&`d.${p.d}`].filter(Boolean).join('  ');
    const td = JSON.stringify({n:p.n,b:p.b,d:p.d,l:p.l,g:p.g}).replace(/"/g,'&quot;');
    // Thin coloured left-edge accent matching branch line colour
    const accent = getBranchColor(p.id);
    s += `<g class="nc" data-t="${td}" onclick="sendPrompt('Tell me more about ${p.n.replace(/'/g,"\\'")} in the Makower family tree')">
      <rect x="${x}" y="${y}" width="${BW}" height="${BH}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
      <rect x="${x}" y="${y}" width="4" height="${BH}" rx="2" fill="${accent}" opacity="0.6"/>
      <text font-family="var(--font-sans,sans-serif)" font-size="11" font-weight="600" fill="${stroke}"
        x="${cx+2}" y="${y+13}" text-anchor="middle" dominant-baseline="central">${tr(p.n,18)}</text>
      <text font-family="var(--font-sans,sans-serif)" font-size="10" fill="${stroke}" opacity="0.8"
        x="${cx+2}" y="${y+27}" text-anchor="middle">${info}</text>
      <text font-family="var(--font-sans,sans-serif)" font-size="9.5" fill="${stroke}" opacity="0.6"
        x="${cx+2}" y="${y+40}" text-anchor="middle">${tr(p.l,18)}</text>
    </g>`;
  });

  s += '</svg>';
  document.getElementById('tree-wrap').innerHTML = s;

  document.querySelectorAll('.nc').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const d = JSON.parse(el.dataset.t);
      const t = document.getElementById('tip');
      let h = `<strong>${d.n}</strong><span style="font-size:11px;opacity:.6;margin-left:5px">${d.g==='M'?'♂':'♀'}</span>`;
      if (d.b) h += `<br>Born: ${d.b}`;
      if (d.d) h += `<br>Died: ${d.d}`;
      if (d.l) h += `<br>📍 ${d.l}`;
      t.innerHTML = h; t.style.opacity = '1';
    });
    el.addEventListener('mousemove', e => {
      const t = document.getElementById('tip');
      t.style.left=(e.clientX+14)+'px'; t.style.top=(e.clientY-10)+'px';
    });
    el.addEventListener('mouseleave', () => { document.getElementById('tip').style.opacity='0'; });
  });
}

function fb(b, btn) {
  activeBranch = b;
  document.querySelectorAll('#fbar button').forEach(e => e.classList.remove('active'));
  btn.classList.add('active');
  buildTree();
}

buildTree();
</script>
